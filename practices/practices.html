<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Practices</title>
</head>

<body>

    <script>
        {
            let a = 10;
            let b = 20;
            console.log("Sum: " + (a + b));
        }
        let car = {
            brand: "Toyota",
            model: "Corolla",
            year: 2022,
            getDetails: function () {
                return this.brand + " " + this.model + " (" + this.year + ")";
            }
        };

        document.write(car.getDetails());

        let student = {
            name: "Ahmed",
            age: 16,
            greet: function () {
                return "Hello, my name is " + this.name;
            }
        };

        document.write(student.greet());

        let numbers = [1, 2, 3, 4, 5];
        let sum = 0;
        for (let i = 0; i < numbers.length; i++) {
            sum += numbers[i];
        }
        console.log("Sum of numbers: " + sum);

    </script>
</body>

</html>
