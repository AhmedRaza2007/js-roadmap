<!DOCTYPE html>
<html>

<head>
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Simple To-Do List With Checkboxes</h1>

    <div class="container">
        <ul id="todoLeft"></ul>
        <ul id="todoRight"></ul>
    </div>

    <script>
        const todos = [
            { id: 1, todo: "Learn JavaScript", completed: true },
            { id: 2, todo: "Practice Loops", completed: false },
            { id: 3, todo: "Build Project", completed: false },
            { id: 4, todo: "Watch Tutorial", completed: true },
            { id: 5, todo: "Study DOM", completed: false },
            { id: 6, todo: "Create Website", completed: false },
            { id: 7, todo: "Debug Code", completed: true },
            { id: 8, todo: "Practice CSS", completed: false },
            { id: 9, todo: "Learn React", completed: false },
            { id: 10, todo: "Make Portfolio", completed: false }
        ];

        const left = document.getElementById("todoLeft");
        const right = document.getElementById("todoRight");

        for (let i = 0; i < todos.length; i++) {

            const item = todos[i];
            const li = document.createElement("li");

            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.checked = item.completed;

            const text = document.createElement("span");
            text.textContent = " " + item.todo;

            li.appendChild(checkbox);
            li.appendChild(text);

            if (i < todos.length /2) {
                left.appendChild(li);
            } else {
                right.appendChild(li);
            }
        }

        
    </script>
</body>

</html>
