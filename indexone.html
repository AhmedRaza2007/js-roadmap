<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<title>Styled Form</title>
</head>
<body>

<section class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white shadow-xl rounded-xl p-8 w-full max-w-md">

<h2 class="text-2xl font-bold text-center mb-6 text-gray-700">
Registration Form
</h2>

<button onclick="clickfunction()" 
class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition mb-4">
Click Me
</button>

<form id="myForm" class="space-y-4">

<input type="text" id="name" placeholder="Enter your name"
class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-400">

<select id="select" onchange="myfunction()"
class="w-full border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-400">

<option value="">Select Course</option>
<option value="HTML">HTML</option>
<option value="CSS">CSS</option>
<option value="JavaScript">JavaScript</option>

</select>

<p id="result" class="text-sm text-gray-600"></p>

<h3 class="font-semibold text-gray-700 mt-4">
Choose your favorite Web language
</h3>

<div class="flex gap-4">

<label class="flex items-center gap-2">
<input type="radio" name="fav_language" value="HTML" class="accent-blue-500">
HTML
</label>

<label class="flex items-center gap-2">
<input type="radio" name="fav_language" value="CSS" class="accent-blue-500">
CSS
</label>

<label class="flex items-center gap-2">
<input type="radio" name="fav_language" value="JavaScript" class="accent-blue-500">
JavaScript
</label>

</div>

<button type="submit"
class="w-full bg-green-500 text-white py-2 rounded-lg hover:bg-green-600 transition">
Submit
</button>

</form>

<br>

<form onsubmit="submitFunction()">
<input type="text" placeholder="Enter name"
class="w-full border border-gray-300 rounded-lg p-2 mb-2">

<input type="submit"
class="w-full bg-purple-500 text-white py-2 rounded-lg hover:bg-purple-600 transition">
</form>

</div>
</section>

<script>

function myfunction() {
let course = document.getElementById("select").value;
document.getElementById("result").innerText = "You selected: " + course;
}

function clickfunction() {
alert("Button Clicked!");
}

function submitFunction() {
alert("Form Submitted!");
}

</script>

</body>
</html>
