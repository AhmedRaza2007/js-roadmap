<!DOCTYPE html>
<html>
<head>
    <title>JavaScript All In One</title>
</head>
<body>

<script>

// JavaScript Operators

let a = 10;
let b = 5;

console.log(a + b);   // Addition
console.log(a - b);   // Subtraction
console.log(a * b);   // Multiplication
console.log(a / b);  // Division
console.log(a > b);   // Comparison (Greater than)
console.log(a == b);   // Comparison (Equal to)
console.log(a != b);   // Comparison (Not equal to)

// JavaScript Numbers

let number = 25.567;

console.log(number.toFixed(2));  // Rounding to 2 decimal places
console.log(Math.sqrt(25));     // Square root
console.log(Math.random());   // Random number between 0 and 1


// JavaScript Functions

function greet(name){
    return "Hello " + name;
}

console.log(greet("Ahmed"));


// JavaScript Arrays

let fruits = ["Apple", "Banana", "Mango"];

fruits.push("Orange"); 

console.log(fruits[0]);


// JavaScript Objects

let person = {
    name: "Ahmed",  
    age: 20,
    city: "Karachi",
    sayHi: function(){   
        return "Hi " + this.name;
    }
};

console.log(person.name); 
console.log(person.sayHi()); 


// JavaScript Loops

for(let i = 0; i < fruits.length; i++){
    console.log(fruits[i]);
}

// While loop

let count = 0;
while(count < 5){
    console.log(count);
    count++;
}

 // JavaScript Array Methods

const numbers = [1, 2, 3, 4, 5];
numbers.forEach(function(num){
    console.log(num);
});

// JavaScript String Methods

const fruitList = ["Apple", "Banana", "Mango", "Orange", "Grapes", "Pineapple"];
for(let i = 0; i < fruitList.length; i++){
    console.log(fruitList[i]);
}


// Global variable
let school = "ABC School";
function showSchool(){
    console.log(school); // Global variable function ke andar access ho raha hai
}
showSchool();


// Function Scope Example

function studentInfo(){
    let studentName = "Ali"; // Function scope variable
    let studentAge = 18;
    console.log(studentName); // Function ke andar chal raha hai
    console.log(studentAge);
}
studentInfo();

// console.log(studentName);
// Error kyun ke variable function ke bahar nahi chalega


// Block Scope Example

for(let i = 1; i <= 3; i++){
    let marks = i * 10; // Block scope variable
    console.log("Marks:", marks);
}
// console.log(marks);
// Error kyun ke marks block ke bahar nahi chalega

// var Scope Example

for(var j = 1; j <= 3; j++){
    var result = j * 5; // var block ke bahar bhi access hota hai
}
console.log(result); // Yeh chal jayega

// Nested Function Scope

function outerFunction(){
    let outerVar = "Outer";
    function innerFunction(){
        let innerVar = "Inner";
        console.log(outerVar); // Outer variable access ho raha hai
        console.log(innerVar); // Inner variable
    }
    innerFunction();
}
outerFunction();
</script>

</body>
</html>
