<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <button onclick="showTables()">Tables Dekho</button>
    <div id="result"></div>

    <script>
        function showTables() {

            let output = "";
            for (let i = 1; i <= 10; i++) {
                output += "5 x " + i + " = " + (5 * i) + "<br>";
            }


            for (let i = 1; i <= 10; i++) {
                output += "7 x " + i + " = " + (7 * i) + "<br>";
            }

            document.getElementById("result").innerHTML = output;
        }
    </script>
</body>

</html>
